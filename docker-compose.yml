# ============================================================================
# PXE Server - Docker Compose Configuration
# ============================================================================
#
# 使用方法:
#   1. cd F:\Programs\pxe-server
#   2. docker-compose up -d
#   3. 访问 http://192.168.8.4:8080
#
# 端口说明:
#   8080: WebUI 管理界面
#   67:   DHCP Server
#   69:   TFTP Server
#   2049: NFS Server
#   20048: NFS Mountd
# ============================================================================

services:
  pxe-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: pxe-server:latest
    container_name: pxe-server
    
    # 使用 host 网络模式 - PXE 需要广播
    network_mode: host
    
    # 特权模式 - 需要访问网络服务
    privileged: true
    
    # 环境变量
    environment:
      # 服务器 IP (修改为你的 Armbian IP)
      SERVER_IP: "192.168.8.4"
      
      # WebUI 端口
      WEBUI_PORT: "8080"
      
      # 子网配置
      SUBNET_MASK: "255.255.255.0"
      SUBNET_NETWORK: "192.168.8.0"
      SUBNET_BROADCAST: "192.168.8.255"
      
      # DHCP 范围
      DHCP_RANGE_START: "192.168.8.100"
      DHCP_RANGE_END: "192.168.8.200"
      
      # 基础目录
      BASE_DIR: "/app"
    
    # 卷挂载 (持久化数据)
    volumes:
      # ISO 文件目录
      - ./data/iso:/app/data/iso:rw
      
      # Boot 文件目录
      - ./data/boot:/app/data/boot:rw
      
      # NFS 共享目录
      - ./data/nfs:/app/data/nfs:rw
      
      # 临时文件目录
      - ./data/temp:/app/data/temp:rw
    
    # 重启策略
    restart: unless-stopped
    
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    # 日志
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
